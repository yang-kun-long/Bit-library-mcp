<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 400px; padding: 20px; font-family: sans-serif; }
    h3 { margin-top: 0; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .note { font-size: 12px; color: #666; margin-top: 5px; }
    .success { color: #155724; background: #d4edda; padding: 10px; border-radius: 4px; margin-top: 10px; }
  </style>
</head>
<body>
  <h3>BIT 图书馆登录设置</h3>

  <div class="form-group">
    <label>学号</label>
    <input type="text" id="username" placeholder="输入学号">
  </div>

  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="输入统一身份认证密码">
    <div class="note">密码加密存储在本地，不会上传</div>
  </div>

  <button id="saveBtn">保存设置</button>

  <div id="message"></div>

  <script src="settings.js"></script>
</body>
</html>
