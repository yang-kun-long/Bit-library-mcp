<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; padding: 10px; font-family: sans-serif; }
    .status { padding: 8px; border-radius: 4px; margin-bottom: 10px; }
    .connected { background: #d4edda; color: #155724; }
    .disconnected { background: #f8d7da; color: #721c24; }
    .info { font-size: 12px; color: #666; margin: 10px 0; }
    input { width: 100%; padding: 6px; margin-top: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 8px; margin-top: 5px; cursor: pointer; }
    .primary { background: #007bff; color: white; border: none; }
    .secondary { background: #6c757d; color: white; border: none; }
  </style>
</head>
<body>
  <h3>Library Access MCP</h3>
  <div id="status" class="status disconnected">未连接</div>

  <div class="info">
    <strong>当前学校：</strong><span id="currentSchool">未检测到</span>
  </div>

  <button id="openDiscoveryBtn" class="primary">打开发现系统</button>
  <button id="testBtn" class="secondary">测试连接</button>

  <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid #ddd;">
    <label style="font-size: 12px; color: #666;">自定义发现系统 URL：</label>
    <input type="text" id="customUrl" placeholder="https://ss.zhizhen.com/">
    <button id="saveUrlBtn" class="secondary">保存</button>
  </div>

  <div id="result" style="margin-top: 10px; font-size: 12px; color: #666;"></div>
  <script src="popup.js"></script>
</body>
</html>
