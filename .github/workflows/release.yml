name: Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extension:
    name: Build & Zip Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip Extension
        run: zip -r library-access-extension.zip extension/
      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: library-access-extension.zip

  build-mcp-server:
    name: Build MCP Server Binary (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile \
            --collect-all uvicorn \
            --collect-all starlette \
            --collect-all pystray \
            --collect-all anyio \
            --collect-all websockets \
            --hidden-import mcp.server \
            --hidden-import mcp.server.streamable_http_manager \
            --hidden-import mcp.server.streamable_http \
            --hidden-import mcp.types \
            --hidden-import uvicorn.main \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.loops.asyncio \
            --hidden-import uvicorn.protocols.http.h11_impl \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import anyio._backends._asyncio \
            --windowed \
            mcp-server/launcher.py --name mcp-server

      - name: Upload Server Binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary
          path: dist/mcp-server.exe

  create-release:
    name: Package & Create GitHub Release
    needs: [build-extension, build-mcp-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package combined release zip
        run: |
          mkdir -p release/extension
          unzip artifacts/extension-zip/library-access-extension.zip -d _ext_tmp
          cp -r _ext_tmp/extension/. release/extension/
          cp artifacts/server-binary/mcp-server.exe release/
          cd release
          zip -r ../library-access-mcp-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: library-access-mcp-${{ github.ref_name }}.zip
          token: ${{ secrets.GITHUB_TOKEN }}
