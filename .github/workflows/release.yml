name: Release Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-extension:
    name: Build & Zip Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Zip Extension
        run: |
          zip -r library-access-extension.zip extension/
      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: library-access-extension.zip

  build-mcp-server:
    name: Build MCP Server Binary (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r requirements.txt

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --onefile \
            --collect-all uvicorn \
            --collect-all starlette \
            --collect-all pystray \
            --collect-all mcp \
            --collect-all anyio \
            --collect-all websockets \
            --hidden-import uvicorn.main \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.loops.asyncio \
            --hidden-import uvicorn.protocols.http.h11_impl \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import anyio._backends._asyncio \
            --windowed \
            mcp-server/launcher.py --name mcp-server-windows-latest

      - name: Upload Server Binary
        uses: actions/upload-artifact@v4
        with:
          name: server-binary-windows-latest
          path: dist/mcp-server-windows-latest.exe

  create-release:
    name: Create GitHub Release
    needs: [build-extension, build-mcp-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/extension-zip/library-access-extension.zip
            artifacts/server-binary-windows-latest/mcp-server-windows-latest.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
